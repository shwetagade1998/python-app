name: python CI pipeline

on:
  push:
    branches: ["main"]

jobs:
  test-application:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: python install
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: install dependency
        run: pip install -r requirements.txt

      - name: run test
        run:  pytest test_app.py

  build-docker-image:
    needs: test-application
    runs-on: ubuntu-latest
    steps:
      - name: code checkout
        uses: actions/checkout@v4

      - name: log into docker hub
        uses: docker/login-action@v3
        with: 
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        
      - name: build image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/python-ci-app:latest .

      - name: push image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/python-ci-app:latest
